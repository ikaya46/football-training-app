<!DOCTYPE html>
<html lang="tr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futbol Antrenman</title>

<style>

body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    padding:20px;
}

.task{
    background:#1e293b;
    margin:20px auto;
    padding:15px;
    border-radius:15px;
    max-width:600px;
}

.task img{
    width:100%;
    border-radius:10px;
}

button{
    padding:12px 20px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

.score{
    font-size:28px;
    margin:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>⚽ Günlük Antrenman</h1>

<div class="score">
Puan: <span id="score">0</span>
|
🔥 Seri: <span id="streak">0</span>
</div>

<div class="task">

<h2>Top Sürme</h2>

<a href="https://www.youtube.com/watch?v=kXqWg0Yj3nE" target="_blank">
<img src="https://img.youtube.com/vi/kXqWg0Yj3nE/0.jpg">
</a>

<br>

<button onclick="completeTask(1)">
Tamamladım
</button>

</div>

<div class="task">

<h2>Pas Çalışması</h2>

<a href="https://www.youtube.com/watch?v=9rC0Djr6A4Q" target="_blank">
<img src="https://img.youtube.com/vi/9rC0Djr6A4Q/0.jpg">
</a>

<br>

<button onclick="completeTask(2)">
Tamamladım
</button>

</div>

<div class="task">

<h2>Şut Çalışması</h2>

<a href="https://www.youtube.com/watch?v=x0zG6kjT7ok" target="_blank">
<img src="https://img.youtube.com/vi/x0zG6kjT7ok/0.jpg">
</a>

<br>

<button onclick="completeTask(3)">
Tamamladım
</button>

</div>

</div>

<script>

let score = localStorage.getItem("score") || 0;
let streak = localStorage.getItem("streak") || 0;

document.getElementById("score").innerText = score;
document.getElementById("streak").innerText = streak;

function completeTask(id){

    let key = "task_" + id;

    if(!localStorage.getItem(key)){

        localStorage.setItem(key, true);

        score = parseInt(score) + 10;

        localStorage.setItem("score", score);

        document.getElementById("score").innerText = score;
    }
}

function checkDailyReset(){

    let today = new Date().toDateString();

    let last = localStorage.getItem("lastDay");

    if(last != today){

        localStorage.clear();

        localStorage.setItem("lastDay", today);

        streak = parseInt(streak) + 1;

        localStorage.setItem("streak", streak);
    }
}

checkDailyReset();

</script>

</body>
</html>
